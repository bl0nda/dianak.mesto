<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./pages/index.css">
    <title>Mesto</title>
</head>

<body class="page">
    <header class="header">
        <div class="header__logo"></div>
    </header>
    <main class="main">
        <section class="profile">
            
                <img src="./images/avatar.jpg" alt="аватарка" class="profile__avatar">
                <div class="profile__name-container">
                    <h1 class="profile__name">Жак-Ив Кусто</h1>
                    <button type="button" class="profile__edit-button"></button>
                </div>
                <h2 class="profile__job">Исследователь океана</h2>
            
            <button type="button" class="profile__add-button"></button>
        </section>
        <section class="elements">
            <ul class="cards">
                <li class="cards__element">
                    <img src="./images/Абхазия.jpg" alt="озеро Рица" class="cards__image">
                    <div class="cards__description">
                        <h2 class="cards__title">Абхазия</h2>
                        <button type="button" class="cards__like"></button>
                    </div>
                </li>
                <li class="cards__element">
                    <img src="./images/Роза-хутор.jpg" alt="Роза Хутор" class="cards__image">
                    <div class="cards__description">
                        <h2 class="cards__title">Сочи</h2>
                        <button type="button" class="cards__like"></button>
                    </div>
                </li>
                <li class="cards__element">
                    <img src="./images/Байкал.jpg" alt="автомобиль на Байкале" class="cards__image">
                    <div class="cards__description">
                        <h2 class="cards__title">Байкал</h2>
                        <button type="button" class="cards__like"></button>
                    </div>
                </li>
                <li class="cards__element">
                    <img src="./images/Эльбрус.jpg" alt="Рассвет.Вид на Эльбрус" class="cards__image">
                    <div class="cards__description">
                        <h2 class="cards__title">Гора Эльбрус</h2>
                        <button type="button" class="cards__like"></button>
                    </div>
                </li>
                <li class="cards__element">
                    <img src="./images/Домбай.jpg" alt="Домбай" class="cards__image">
                    <div class="cards__description">
                        <h2 class="cards__title">Домбай</h2>
                        <button type="button" class="cards__like"></button>
                    </div>
                </li>
                <li class="cards__element">
                    <img src="./images/Карачаево-Ч.jpg" alt="замок в Карачаева-Черкессии" class="cards__image">
                    <div class="cards__description">
                        <h2 class="cards__title">Карачаево-Черкессия</h2>
                        <button type="button" class="cards__like"></button>
                    </div>
                </li>
            </ul>
        </section>
    </main>
    <footer class="footer">
        <p class="footer__text">&copy; 2022 Mesto Russia</p>
    </footer>
    <section class="popup">
        <div class="popup__container">
            <button type="button" class="popup__close-button"></button>
            <h2 class="popup__title">Редактировать профиль</h2>
            <form name="profile-info" class="popup__form">
                <input type="text" name="change-name" class="popup__field popup__field_change_name">
                <input type="text" name="change-job" class="popup__field popup__field_change_job">
                <button type="submit" class="popup__submit-button">Сохранить</button>
            </form>
        </div>
    </section>
    <script src="./scripts/index.js"></script>
</body>

</html>
